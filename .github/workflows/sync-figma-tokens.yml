name: Sync Figma Tokens

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1-5'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create tokens directory
        run: mkdir -p tokens

      - name: Fetch Figma File
        run: |
          curl -s -H "X-Figma-Token: ${{ secrets.FIGMA_TOKEN }}" \
            "https://api.figma.com/v1/files/${{ secrets.FIGMA_FILE_KEY }}" \
            -o tokens/figma-file.json

      - name: Generate CSS tokens
        run: node scripts/generate-tokens.cjs

      - name: Clean up old token files
        run: rm -f tokens/figma-styles.json tokens/figma-variables.json

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tokens/
          git diff --cached --quiet || (git commit -m "🎨 Sync Figma tokens" && git push)
permissions:
  contents: write
